[tools]
packer = "1.9.4"

[tasks]
install_tart = "brew install cirruslabs/cli/tart"
build_macos = "packer init macos-base.pkr.hcl && packer build macos-base.pkr.hcl"

[tasks.bootstrap]
description = "Install all prerequisities"
depends = ["install_tart"]
run = "mise install && packer plugins install github.com/cirruslabs/tart"

[tasks.build_xcode]
description = "Build new Xcode image"
usage = '''
arg "<xcode_version>" help="Xcode version to be installed, make sure you have '~/Downloads/Xcode_<xcode_version>.xip' downloaded"
'''
run = "packer build -var xcode_version=${usage_xcode_version} ackee-xcode.pkr.hcl"

[tasks.push_macos_base]
description = "Push local macos-base macOS base image to DockerHub with given tag"
usage = '''
arg "<tag>" help="Tag that will be used for the image, e.g. 26.3 would produce image macos_base:26.3"
'''
run = [
    "tart push macos-base registry.hub.docker.com/ackee/tart-macos-base:${usage_tag} --populate-cache --concurrency 1",
    "git tag macos-base/${usage_tag} && git push origin macos-base/${usage_tag}",
]

[tasks.push_xcode]
description = "Push built Xcode image to DockerHub"
usage = '''
arg "<version>" help="Xcode version to be pushed to DockerHub, expects image 'ackee-xcode:<version>' to be built in tart and authenticated account to DockerHub, also pushes tag to git"
'''
run = [
    "tart push ackee-xcode:${usage_version} registry.hub.docker.com/ackee/tart-gitlab-builder-ios:${usage_version} --populate-cache --concurrency 1",
    "git tag ackee-xcode/${usage_version} && git push origin ackee-xcode/${usage_version}",
]